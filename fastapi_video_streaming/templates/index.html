<!DOCTYPE html>
<html>

<head>
    <title>Video Streaming With FastAPI</title>
</head>

<body>
    <video src="http://localhost:8090" autoplay loop></video>
    {% for image_provider_key in image_provider_keys %}
    <img src="http://localhost:8000/video_stream/{{image_provider_key}}?width={{ width }}">
    {% endfor %}
</body>

</html>
